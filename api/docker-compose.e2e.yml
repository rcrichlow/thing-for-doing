services:
  db-e2e:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: api_test
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
    networks:
      - tfd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-e2e:
    build: .
    command: bash -c "bundle install && bundle exec rails db:prepare && rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/app
    ports:
      - "3001:3000"
    depends_on:
      db-e2e:
        condition: service_healthy
    environment:
      DB_HOST: db-e2e
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RAILS_ENV: test
    networks:
      - tfd-network
    stdin_open: true
    tty: true

volumes:
  postgres_e2e_data:

networks:
  tfd-network:
    name: tfd-network
    external: true
